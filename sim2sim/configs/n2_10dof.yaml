# 
policy_path: "{LEGGED_GYM_ROOT_DIR}/sim2sim/policy/policy.pt"
xml_path: "{LEGGED_GYM_ROOT_DIR}/resources/robots/N2/mjcf/N2_10dof.xml"

# Total simulation time
simulation_duration: 60.0
# Simulation time step
simulation_dt: 0.002
# Controller update frequency (meets the requirement of simulation_dt * controll_decimation=0.02; 50Hz)
control_decimation: 10

kps: [80, 80, 120, 120, 20, 80, 80, 120, 120, 20]
kds: [5, 5, 5, 5, 2, 5, 5, 5, 5, 2]
# Per-actuator effort/torque limits (Nm), legs only: hip_yaw,hip_roll,hip_pitch,knee,ankle x2
tau_limit: [90, 90, 150, 150, 70, 90, 90, 150, 150, 70]

default_angles: [0.0, 0.0, -0.1495, 0.3215, -0.1720,
                 0.0, 0.0, -0.1495, 0.3215, -0.1720]

ang_vel_scale: 1.0
dof_pos_scale: 1.0
dof_vel_scale: 0.05
action_scale: 0.25
cmd_scale: [2.0, 2.0, 1.0]
num_actions: 10 #18
num_single_obs: 39 #63
frame_stack: 10 #5
num_obs:  390 #num_single_obs * frame_stack #315

cmd_init: [0, 0, 0]

# Training uses commands.heading_command=True: commands[:,2] is recomputed
# every step as clip(0.5*wrap_to_pi(heading_target - current_heading), -1, 1),
# not held at a fixed rate. sim2sim replicates this closed loop when true;
# command.cmd[2] (Insert/Delete keys) becomes the requested heading delta
# (rad) from the robot's spawn heading, not a raw yaw-rate command.
heading_command: true